site_name: Homelab
site_description: Single-node Talos Kubernetes homelab — Terraform, Ansible, GitOps
site_author: Juraj Zvolensky
site_url: https://jzvolensky.github.io/homelab/
copyright: Copyright &copy; Juraj Zvolensky

repo_url: https://github.com/jzvolensky/homelab
repo_name: jzvolensky/homelab
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  palette:
    # Follow system preference
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.action.edit

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jzvolensky
      name: GitHub

nav:
  - Home: index.md
  - Prerequisites: 01-prerequisites.md
  - Proxmox & Talos: 02-proxmox-and-talos.md
  - GitOps Bootstrap: 03-gitops-bootstrap.md
  - Cloudflare Tunnel: 04-cloudflare-tunnel.md
  - Talos Extensions: 05-talos-extensions.md
  - talosctl Cheatsheet: 06-talosctl-cheatsheet.md
