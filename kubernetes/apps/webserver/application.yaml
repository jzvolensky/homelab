apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: webserver-rs
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: homelab-eppan
    source:
        repoURL: git@github.com:jzvolensky/homelab
        targetRevision: main
        path: kubernetes/apps/webserver
    destination:
        server: https://kubernetes.default.svc
        namespace: argocd
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
