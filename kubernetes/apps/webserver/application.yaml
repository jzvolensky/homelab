apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: webserver-rs
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    source:
        repoURL: https://github.com/jzvolensky/homelab.git
        targetRevision: main
        path: kubernetes/apps/webserver
    destination:
        server: https://kubernetes.default.svc
        namespace: argocd
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - PrunePropagationPolicy=foreground
            - PruneLast=true
            - ApplyOutOfSyncOnly=true
            - RespectIgnoreDifferences=true
