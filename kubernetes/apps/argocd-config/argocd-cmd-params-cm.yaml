apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Run argocd-server without its own TLS — Cloudflare terminates TLS at the edge
  # and Traefik forwards plain HTTP to argocd-server:80. Requires an
  # argocd-server pod restart to take effect (see README).
  server.insecure: "true"
