apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Each entry is an Argo CD Application (app-of-apps). The root app syncs these;
# each Application then deploys its own workload. Add apps as you migrate them
# from the old homelab-deployments repo.
resources:
    - traefik/traefik-app.yaml # ingress controller (Helm)
    - argocd-config/argocd-config-app.yaml # expose argocd + GitHub OAuth
    - webserver/application.yaml # website
